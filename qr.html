        /* Wrapper */
        .wrap{position:relative;z-index:10;width:100%;max-width:400px;padding:32px 16px;display:flex;flex-direction:column;align-items:center}

        /* Card */
        .card{
            width:100%;
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(40px) saturate(150%);-webkit-backdrop-filter:blur(40px) saturate(150%);
            border:1px solid rgba(255,255,255,0.25);border-radius:22px;
            box-shadow:0 8px 32px rgba(0,0,0,0.06),0 1px 0 rgba(255,255,255,0.3) inset;
            padding:20px 16px;position:relative;overflow:hidden;
            animation:ci .6s cubic-bezier(0.16,1,0.3,1) forwards;
        }
        .card::before{content:'';position:absolute;top:0;left:0;right:0;height:35%;background:linear-gradient(180deg,rgba(255,255,255,0.15) 0%,transparent 100%);pointer-events:none;border-radius:22px 22px 0 0}
        @keyframes ci{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
        .inner{position:relative;z-index:2}

        /* Views */
        .view{transition:.3s cubic-bezier(0.16,1,0.3,1);display:flex;flex-direction:column;width:100%}
        .view.hidden{opacity:0;pointer-events:none;position:absolute;visibility:hidden;transform:scale(.96);inset:20px 16px}
        .view.active{opacity:1;position:relative;visibility:visible;transform:scale(1)}

        /* Badge Euronext */
        .badge{
            display:flex;align-items:center;justify-content:center;gap:8px;align-self:center;
            background:rgba(0,0,0,0.04);
            padding:7px 14px;border-radius:100px;
            font-size:10px;font-weight:600;text-transform:none;letter-spacing:.3px;
            color:var(--gray4);border:1px solid var(--gray8);margin-bottom:8px;
        }
        .badge img{height:28px;width:auto}

        /* Profile */
        .profile{display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:8px}

        .avatar-overlay{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.85);display:none;align-items:center;justify-content:center;cursor:pointer;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
        .avatar-overlay.show{display:flex}
        .avatar-overlay img{max-width:85vw;max-height:85vh;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,0.5);animation:zi .3s ease}
        @keyframes zi{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
        .avatar-ring{cursor:pointer}
        .avatar-ring{
            width:100px;height:100px;border-radius:50%;padding:3px;
            background:linear-gradient(135deg,#000B2E 0%,#0A1547 40%,#2E2494 70%,#5245F0 100%);
            position:relative;margin-bottom:8px;
            box-shadow:0 4px 16px rgba(0,0,0,0.1);
        }
        .avatar{width:100%;height:100%;border-radius:50%;object-fit:cover;display:block;border:2px solid var(--white);background:var(--white)}
        .name{font-size:20px;font-weight:700;letter-spacing:-.4px;line-height:1.2;color:var(--white)}
        .role{font-size:13px;font-weight:500;color:rgba(255,255,255,0.75);margin-top:2px}
        .tagline{font-size:11px;color:rgba(255,255,255,0.65);margin-top:4px;font-weight:400;font-style:italic}

        /* Divider */
        .divider{height:1px;background:var(--gray8);margin:10px 0;opacity:.7}

        /* Contact List */
        .contact-list{display:flex;flex-direction:column;gap:4px;margin-bottom:0}
        .contact-item{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--white);padding:4px 0;transition:opacity .2s}
        .contact-item:active{opacity:.6}
        .contact-icon{
            width:20px;height:20px;display:flex;align-items:center;justify-content:center;
            flex-shrink:0;
        }
        .contact-icon svg{width:18px;height:18px;fill:var(--gray5)}
        .contact-text{display:flex;flex-direction:column}
        .contact-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--gray6)}
        .contact-value{font-size:13px;font-weight:500;color:var(--white)}

        /* Social Row */
        .social-row{display:flex;justify-content:center;gap:12px;margin-bottom:6px}
        .social-btn{
            width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
            background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);transition:all .2s;text-decoration:none;
        }
        .social-btn svg{width:18px;height:18px;fill:white;transition:fill .2s}
        .social-btn img{transition:filter .2s;filter:brightness(10)}
        .social-btn:hover{background:rgba(255,255,255,0.95);border-color:rgba(255,255,255,0.9)}
        .social-btn:hover svg{fill:var(--original-color,#333)}
        .social-btn:hover img{filter:none}
        .social-btn:active{transform:scale(.92)}

        /* Buttons */
        .btn-primary{
            width:100%;padding:12px;border-radius:12px;border:none;cursor:pointer;
            font-family:inherit;font-size:14px;font-weight:600;letter-spacing:-.2px;
            background:linear-gradient(135deg,#000B2E 0%,#0A1547 40%,#2E2494 70%,#5245F0 100%);color:var(--white);
            box-shadow:0 2px 8px rgba(0,0,0,0.15);
            transition:all .25s;display:flex;align-items:center;justify-content:center;gap:8px;
            margin-bottom:8px;
        }
        .btn-primary:hover{background:#2EB67D !important;box-shadow:0 4px 12px rgba(46,182,125,0.35)}
        .btn-primary:active{transform:scale(.97);opacity:.85}
        .btn-secondary{
            width:100%;padding:11px;border-radius:12px;border:none;cursor:pointer;
            font-family:inherit;font-size:14px;font-weight:600;letter-spacing:-.2px;
            background:#E01E5A;color:var(--white);
            transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;
        }
        .btn-secondary:hover{background:#0A1A3F;box-shadow:0 4px 12px rgba(10,26,63,0.4)}.btn-secondary:active{transform:scale(.97);background:#0A1A3F}

        /* QR View */
        .qr-section{display:flex;flex-direction:column;align-items:center;padding:12px 0}
        .qr-title{font-size:16px;font-weight:700;color:var(--white);margin-bottom:4px}
        .qr-subtitle{font-size:12px;color:var(--gray5);margin-bottom:16px}
        .qr-frame{
            width:200px;height:200px;padding:16px;border-radius:20px;
            background:rgba(255,255,255,0.65);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
            box-shadow:0 4px 20px rgba(0,0,0,0.06);border:1px solid var(--gray8);
            display:flex;align-items:center;justify-content:center;margin-bottom:16px;
        }
        .qr-frame img{width:100%;height:100%;object-fit:contain}
        .qr-hint{font-size:11px;color:var(--gray6);text-align:center;line-height:1.4}

        /* Footer */
        .footer{text-align:center;padding:20px 0 8px;font-size:10px;color:var(--gray6);letter-spacing:.3px}

        /* Send contact back */
        .send-back{
            margin-top:16px;padding:16px;border-radius:16px;
            background:rgba(0,0,0,0.03);border:1px solid var(--gray8);text-align:center;
        }
        .send-back p{font-size:12px;color:var(--gray5);margin-bottom:6px;line-height:1.4}
        .send-back a{
            display:inline-flex;align-items:center;gap:6px;
            font-size:13px;font-weight:600;color:var(--white);text-decoration:none;
            padding:10px 20px;border-radius:10px;background:rgba(255,255,255,0.65);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
            border:1px solid var(--gray7);transition:all .2s;
        }
        .send-back a:active{background:var(--gray9);transform:scale(.97)}
    </style>
</head>
